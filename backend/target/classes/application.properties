server.port=8080

# PostgreSQL (Neon Cloud - Free Tier)
# ─── HOW TO SET UP ───
# 1. Go to https://neon.tech and sign up (free, no credit card)
# 2. Create a project → copy the connection string
# 3. Replace the values below with your Neon credentials
# ─────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CORS Origins (Comma separated for multiple, e.g. https://my-frontend.vercel.app)
cors.allowed-origins=https://examflow-nine.vercel.app

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Admin credentials
admin.token=admin123

# Logging
logging.level.com.onlinetest=INFO
